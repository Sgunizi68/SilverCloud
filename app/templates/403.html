{% extends "base.html" %}
{% block title %}Erişim Reddedildi - SilverCloud{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; height:70vh;">
    <div class="card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; max-width:500px; padding:40px;">
        <div style="font-size:4rem; margin-bottom:10px;">🔒</div>
        <h1 style="font-size:1.8rem; font-weight:700; color:#e74c3c; margin:0;">Erişim Reddedildi</h1>
        <p style="color:#555; font-size:1rem; margin:0; line-height:1.5;">
            Bu sayfayı görüntülemek için gerekli yetkiye sahip değilsiniz.
            <br><br>
            <strong>Gerekli Yetki:</strong> <span style="color:#d35400; font-weight: 600;">{{ required_permission }}</span>
        </p>
        <a href="javascript:history.back()" style="
            margin-top:20px;
            padding:10px 25px;
            background:#667eea;
            color:white;
            border-radius:6px;
            text-decoration:none;
            font-weight:600;
            font-size:0.95rem;
            transition: background 0.3s;
        " onmouseover="this.style.background='#5568d3'" onmouseout="this.style.background='#667eea'">← Geri Dön</a>
    </div>
</div>
{% endblock %}
